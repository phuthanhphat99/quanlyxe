<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --line: #e1e4e8;
      --text: #0f172a;
      --muted: #6b7280;
      --primary: #3b82f6;
      --danger: #ef4444;
      --ok: #10b981;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    body {
      overflow-y: auto;
      padding: 12px;
      font-size: 13px;
    }
    .header {
      background: var(--card);
      border-bottom: 2px solid #fbbf24;
      padding: 14px;
      margin: -12px -12px 12px -12px;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
    }
    .header p {
      margin: 4px 0 0 0;
      font-size: 12px;
      color: var(--muted);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .card h2 {
      margin: 0 0 10px 0;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }
    .btn-group {
      display: grid;
      gap: 8px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }
    .primary { background: #3b82f6; color: white; }
    .pro { background: #fbbf24; color: #78350f; }
    .danger { background: #fecaca; color: #991b1b; }
    .ghost { background: #f3f4f6; color: #4b5563; }
    .header-btn {
      white-space: nowrap;
    }
    .input-group { margin-bottom: 10px; }
    .label {
      display: block;
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .kv {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 8px;
      margin-top: 10px;
      font-size: 12px;
    }
    .kv-k { color: var(--muted); font-weight: 600; }
    .kv-v {
      word-break: break-all;
      font-family: monospace;
      font-size: 11px;
      background: #f9fafb;
      padding: 4px 6px;
      border-radius: 4px;
    }
    .status {
      margin-top: 10px;
      font-size: 11px;
      border-radius: 6px;
      padding: 10px;
      border-left: 3px solid #e1e4e8;
      background: #f9fafb;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: monospace;
      min-height: 60px;
    }
    .status.ok {
      border-left-color: #10b981;
      color: #065f46;
      background: #ecfdf5;
    }
    .status.err {
      border-left-color: #ef4444;
      color: #7f1d1d;
      background: #fef2f2;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-content">
      <div>
        <h1>FleetPro V3 Setup PRO</h1>
        <p>Nhập ID → Seed data mẫu → ALL IN ONE</p>
      </div>
      <button class="header-btn pro" onclick="saveSheetId()">Lưu Sheet ID</button>
    </div>
  </div>

  <div class="card">
    <h2>Bước 1: Cấu hình Spreadsheet</h2>
    <div class="input-group">
      <label class="label">Dán Spreadsheet ID hoặc URL</label>
      <input id="sheetInput" placeholder="https://docs.google.com/spreadsheets/d/... hoặc chỉ ID" />
      <button class="pro" onclick="saveSheetId()">Nhập dữ liệu PRO</button>
    </div>

    <div class="kv">
      <div class="kv-k">Sheet ID</div>
      <div class="kv-v" id="sheetIdValue">-</div>

      <div class="kv-k">Tenant</div>
      <div class="kv-v" id="tenantValue">-</div>

      <div class="kv-k">Domain</div>
      <div class="kv-v" id="domainValue">-</div>
    </div>
  </div>

  <div class="card">
    <h2>Bước 2-4: Thực thi Setup</h2>
    <div class="btn-group">
      <button class="primary" onclick="runSeed()">Bước 2: Seed Data Mẫu</button>
      <button class="pro" onclick="runAllInOne()">Chạy ALL IN ONE</button>
      <button class="danger" onclick="runClear()">Bước 3: Xóa All Data Mẫu</button>
    </div>
  </div>

  <div class="card">
    <h2>Thông tin & Hỗ trợ</h2>
    <div class="btn-group">
      <button class="ghost" onclick="loadMvp()">Xem MVP MAP</button>
      <button class="ghost" onclick="loadSnapshot()">Làm mới</button>
    </div>
  </div>

  <div class="card">
    <h2>Trạng thái</h2>
    <div id="status" class="status ok">Sẵn sàng.</div>
  </div>

  <script>
    function setStatus(text, ok) {
      var el = document.getElementById('status');
      el.textContent = text;
      el.className = 'status ' + (ok ? 'ok' : 'err');
    }

    function callServer(fnName, args, onDone) {
      var runner = google.script.run
        .withSuccessHandler(function(res) {
          if (res && res.status === 'error') {
            setStatus('Lỗi: ' + (res.message || 'Không xác định'), false);
          } else {
            setStatus('Thành công', true);
          }
          if (onDone) onDone(res || {});
        })
        .withFailureHandler(function(err) {
          setStatus('Lỗi Apps Script: ' + (err && err.message ? err.message : err), false);
        });

      runner[fnName].apply(runner, args || []);
    }

    function loadSnapshot() {
      callServer('uiGetSetupSnapshot', [], function(res) {
        document.getElementById('sheetIdValue').textContent = res.spreadsheetId || '-';
        document.getElementById('tenantValue').textContent = res.tenantId || '-';
        document.getElementById('domainValue').textContent = res.domain || '-';
      });
    }

    function saveSheetId() {
      var input = document.getElementById('sheetInput').value.trim();
      if (!input) {
        setStatus('Bạn chưa nhập Spreadsheet ID hoặc URL.', false);
        return;
      }

      setStatus('Đang lưu Spreadsheet ID...', true);
      callServer('uiSetSpreadsheetId', [input], function(res) {
        loadSnapshot();
        if (res && res.message) {
          setStatus(res.message, true);
        } else {
          setStatus('Đã lưu Spreadsheet ID.', true);
        }
      });
    }

    function runSeed() {
      setStatus('Đang seed data mẫu...', true);
      callServer('uiSeedSampleData', []);
    }

    function runClear() {
      setStatus('Đang xóa data mẫu...', true);
      callServer('uiClearSampleData', []);
    }

    function runAllInOne() {
      setStatus('Đang chạy ALL IN ONE...', true);
      callServer('uiRunAllInOne', []);
    }

    function loadMvp() {
      callServer('uiExplainMvpMap', [], function(res) {
        setStatus(JSON.stringify(res, null, 2), true);
      });
    }

    window.onload = loadSnapshot;
  </script>
</body>
</html>
